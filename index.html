<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agent Live Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2300e5ff'/%3E%3Cpath d='M8 22 L16 10 L24 22' stroke='%230a0a0f' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='16' cy='10' r='2' fill='%230a0a0f'/%3E%3C/svg%3E"/>

<style>
/* ══════════ CSS RESET & VARIABLES ══════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0a0a0f;
  --bg2:        #111118;
  --bg3:        #1a1a24;
  --border:     rgba(255,255,255,0.07);
  --border2:    rgba(255,255,255,0.12);
  --text:       #e8e8f0;
  --text2:      #9090a8;
  --text3:      #5a5a72;
  --accent:     #00e5ff;
  --accent2:    #7c3aed;
  --accent3:    #10b981;
  --accent4:    #f59e0b;
  --accent5:    #ef4444;
  --card-bg:    rgba(255,255,255,0.03);
  --card-hover: rgba(255,255,255,0.055);
  --glow:       rgba(0,229,255,0.15);
  --radius:     16px;
  --radius-sm:  10px;
  --font:       'Syne', sans-serif;
  --mono:       'DM Mono', monospace;
  --transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
}

[data-theme="light"] {
  --bg:         #f0f0f8;
  --bg2:        #ffffff;
  --bg3:        #e8e8f4;
  --border:     rgba(0,0,0,0.07);
  --border2:    rgba(0,0,0,0.12);
  --text:       #1a1a2e;
  --text2:      #5a5a7a;
  --text3:      #9090b0;
  --accent:     #006eb8;
  --accent2:    #6d28d9;
  --accent3:    #059669;
  --accent4:    #d97706;
  --accent5:    #dc2626;
  --card-bg:    rgba(255,255,255,0.7);
  --card-hover: rgba(255,255,255,0.95);
  --glow:       rgba(0,110,184,0.1);
  --border:     rgba(0,0,0,0.08);
}

html { font-size: 16px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.5s ease, color 0.5s ease;
}

/* ══════════ BACKGROUND GRID ══════════ */
.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 48px 48px;
  opacity: 0.5;
  transition: opacity 0.5s;
}
[data-theme="light"] .bg-grid { opacity: 0.3; }

.bg-orb {
  position: fixed; pointer-events: none; border-radius: 50%; z-index: 0;
  filter: blur(80px); opacity: 0.12;
  transition: opacity 0.5s;
}
.bg-orb1 { width: 600px; height: 600px; background: var(--accent);  top: -200px; left: -100px; }
.bg-orb2 { width: 500px; height: 500px; background: var(--accent2); bottom: -150px; right: -100px; }
[data-theme="light"] .bg-orb { opacity: 0.06; }

/* ══════════ LAYOUT ══════════ */
#app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

/* ══════════ HEADER ══════════ */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid var(--border2);
  backdrop-filter: blur(20px);
  background: rgba(10,10,15,0.6);
  position: sticky; top: 0; z-index: 100;
  transition: background 0.5s ease;
}
[data-theme="light"] header { background: rgba(240,240,248,0.8); }

.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 36px; height: 36px; }
.logo-text {
  font-size: 18px; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo-sub { font-size: 11px; color: var(--text3); font-weight: 400; letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }

.header-right { display: flex; align-items: center; gap: 16px; }

/* Live indicator */
.live-badge {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--card-bg);
  font-size: 12px; font-weight: 600; color: var(--accent3);
  letter-spacing: 1px;
}
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent3);
  animation: pulse-dot 1.5s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.4); opacity: 0.7; }
}

/* Sync timer */
.sync-ring {
  position: relative; width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
}
.sync-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
.sync-ring-track { stroke: var(--border2); fill: none; stroke-width: 2.5; }
.sync-ring-progress { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round;
  stroke-dasharray: 88; stroke-dashoffset: 88;
  transition: stroke-dashoffset 1s linear;
}
.sync-icon { width: 16px; height: 16px; color: var(--text2); transition: transform 0.5s ease; }
.sync-icon.spinning { animation: spin 0.8s linear; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

#lastUpdated { font-size: 11px; color: var(--text3); font-family: var(--mono); }

/* Theme toggle */
.theme-btn {
  width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border2);
  background: var(--card-bg); cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: var(--transition); color: var(--text2);
}
.theme-btn:hover { background: var(--card-hover); border-color: var(--accent); color: var(--accent); transform: scale(1.05); }

/* ══════════ TOP STATS BAR ══════════ */
.stats-bar {
  display: flex; gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border2);
  overflow: hidden;
}
.stat-pill {
  flex: 1; padding: 14px 20px; background: var(--bg2);
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  transition: background 0.3s ease;
  opacity: 0; transform: translateY(-10px);
  animation: slideInTop 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
}
.stat-pill:nth-child(1) { animation-delay: 0.05s; }
.stat-pill:nth-child(2) { animation-delay: 0.1s; }
.stat-pill:nth-child(3) { animation-delay: 0.15s; }
.stat-pill:nth-child(4) { animation-delay: 0.2s; }
@keyframes slideInTop { to { opacity: 1; transform: translateY(0); } }
.stat-pill-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }
.stat-pill-val { font-size: 22px; font-weight: 800; }
.stat-pill-val.c-accent  { color: var(--accent); }
.stat-pill-val.c-accent2 { color: var(--accent2); }
.stat-pill-val.c-accent3 { color: var(--accent3); }
.stat-pill-val.c-accent4 { color: var(--accent4); }
.stat-pill-val.c-accent5 { color: var(--accent5); }

/* ══════════ MAIN STAGE ══════════ */
.stage {
  flex: 1; padding: 32px 40px 40px;
  display: flex; flex-direction: column; gap: 24px;
}

/* ══════════ SLIDE HEADER ══════════ */
.slide-header { display: flex; align-items: center; justify-content: space-between; }
.slide-title { font-size: 13px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; font-family: var(--mono); }
.slide-counter { display: flex; gap: 8px; align-items: center; }
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border2); cursor: pointer;
  transition: var(--transition);
}
.dot.active { background: var(--accent); transform: scale(1.3); }
.dot:hover  { background: var(--text2); }

.nav-btns { display: flex; gap: 8px; }
.nav-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border2);
  background: var(--card-bg); cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text2); transition: var(--transition);
}
.nav-btn:hover { background: var(--card-hover); border-color: var(--accent); color: var(--accent); }

/* Progress bar */
.slide-progress { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
.slide-progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px; width: 0%;
  transition: width 1s linear;
}

/* ══════════ CAROUSEL ══════════ */
.carousel { position: relative; overflow: hidden; flex: 1; min-height: 400px; }
.slides-wrapper {
  display: flex; height: 100%;
  transition: transform 0.7s cubic-bezier(0.16,1,0.3,1);
}
.slide {
  min-width: 100%; height: 100%;
  display: grid; gap: 20px; align-content: start;
}
.slide.agents-1 { grid-template-columns: 1fr; }
.slide.agents-2 { grid-template-columns: repeat(2, 1fr); }
.slide.agents-3 { grid-template-columns: repeat(3, 1fr); }

/* ══════════ AGENT CARD ══════════ */
.agent-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  display: flex; flex-direction: column; gap: 20px;
  transition: var(--transition);
  position: relative; overflow: hidden;
  opacity: 0; transform: translateY(30px);
  animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
}
.agent-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  opacity: 0; transition: opacity 0.3s ease;
}
.agent-card:hover { background: var(--card-hover); border-color: var(--border2); transform: translateY(-3px); box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.agent-card:hover::before { opacity: 1; }

@keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
.agent-card:nth-child(1) { animation-delay: 0.05s; }
.agent-card:nth-child(2) { animation-delay: 0.15s; }
.agent-card:nth-child(3) { animation-delay: 0.25s; }

/* Card header */
.card-head { display: flex; align-items: center; justify-content: space-between; }
.agent-info { display: flex; align-items: center; gap: 12px; }
.agent-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0;
  position: relative;
}
.agent-avatar::after {
  content: '';
  position: absolute; inset: -3px; border-radius: 50%;
  border: 2px solid transparent;
  background: linear-gradient(135deg, var(--accent), var(--accent2)) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out; mask-composite: exclude;
  opacity: 0; transition: opacity 0.3s ease;
}
.agent-card:hover .agent-avatar::after { opacity: 1; }

.agent-name { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.agent-date { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }

.card-badge {
  padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  background: rgba(16,185,129,0.1); color: var(--accent3); border: 1px solid rgba(16,185,129,0.2);
}
.card-badge.no-data {
  background: rgba(239,68,68,0.1); color: var(--accent5); border-color: rgba(239,68,68,0.2);
}
.card-badge.top-badge {
  background: rgba(245,158,11,0.15); color: var(--accent4); border: 1px solid rgba(245,158,11,0.35);
  animation: pulse-dot 2s ease-in-out infinite;
}

/* Metrics grid */
.metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.metric {
  background: var(--bg3);
  border-radius: var(--radius-sm);
  padding: 14px;
  border: 1px solid var(--border);
  position: relative; overflow: hidden;
  transition: var(--transition);
}
.metric:hover { border-color: var(--border2); }

.metric-icon { width: 28px; height: 28px; margin-bottom: 10px; opacity: 0.8; }
.metric-val { font-size: 28px; font-weight: 800; line-height: 1; font-family: var(--mono); letter-spacing: -1px; }
.metric-label { font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text3); margin-top: 4px; }

.metric.m-total  .metric-val { color: var(--accent); }
.metric.m-fax    .metric-val { color: var(--accent2); }
.metric.m-follow .metric-val { color: var(--accent3); }
.metric.m-pure   .metric-val { color: var(--accent4); }
.metric.m-miss   .metric-val { color: var(--accent5); }

.metric::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  border-radius: 0 2px 2px 0;
}
.metric.m-total::before  { background: var(--accent); }
.metric.m-fax::before    { background: var(--accent2); }
.metric.m-follow::before { background: var(--accent3); }
.metric.m-pure::before   { background: var(--accent4); }
.metric.m-miss::before   { background: var(--accent5); }

.metric.m-total.span2 { grid-column: span 2; }

/* ══════════ EMPTY / ERROR / LOADING STATES ══════════ */
.state-screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  color: var(--text2); text-align: center; padding: 40px;
}
.state-icon { width: 64px; height: 64px; opacity: 0.4; }
.state-title { font-size: 20px; font-weight: 700; color: var(--text); }
.state-msg { font-size: 14px; color: var(--text2); max-width: 400px; line-height: 1.6; }
.loader-ring {
  width: 60px; height: 60px;
  border: 3px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* ══════════ CONFIG BANNER ══════════ */
.config-banner {
  background: rgba(245,158,11,0.08);
  border: 1px solid rgba(245,158,11,0.2);
  border-radius: var(--radius-sm);
  padding: 14px 20px;
  display: flex; align-items: center; gap: 12px;
  font-size: 13px; color: var(--accent4);
}
.config-banner code {
  font-family: var(--mono); background: var(--bg3);
  padding: 2px 8px; border-radius: 4px; font-size: 12px; color: var(--text);
}

/* ══════════ NO DATA CARD ══════════ */
.no-data-card {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; color: var(--text3); padding: 20px; text-align: center;
}
.no-data-card svg { opacity: 0.3; }
.no-data-card span { font-size: 13px; }

/* ══════════ SCROLLBAR ══════════ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ══════════ RESPONSIVE ══════════ */
@media (max-width: 900px) {
  header { padding: 16px 20px; }
  .stage { padding: 20px; }
  .slide.agents-3 { grid-template-columns: repeat(2, 1fr); }
  #lastUpdated { display: none; }
}
@media (max-width: 600px) {
  .slide.agents-2,
  .slide.agents-3 { grid-template-columns: 1fr; }
  .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  .metric.m-total.span2 { grid-column: span 2; }
  .stats-bar { display: none; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-orb bg-orb1"></div>
<div class="bg-orb bg-orb2"></div>

<div id="app">

  <!-- ══ HEADER ══ -->
  <header>
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="36" height="36" rx="10" fill="url(#lg)"/>
        <path d="M11 25 L18 11 L25 25" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="13.5" y1="20" x2="22.5" y2="20" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
            <stop stop-color="#00e5ff"/>
            <stop offset="1" stop-color="#7c3aed"/>
          </linearGradient>
        </defs>
      </svg>
      <div>
        <div class="logo-text">LiveBoard</div>
        <div class="logo-sub">Agent Performance</div>
      </div>
    </div>

    <div class="header-right">
      <div class="live-badge">
        <div class="live-dot"></div>
        LIVE
      </div>
      <div class="live-badge" id="shiftBadge" style="color:var(--accent4);border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.07);display:none;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="shiftLabel">—</span>
      </div>
      <div id="lastUpdated">—</div>

      <!-- Sync progress ring -->
      <div class="sync-ring" title="Next sync">
        <svg width="36" height="36" viewBox="0 0 36 36">
          <circle class="sync-ring-track" cx="18" cy="18" r="14"/>
          <circle class="sync-ring-progress" id="syncRing" cx="18" cy="18" r="14"/>
        </svg>
        <svg class="sync-icon" id="syncIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 4v6h-6"/>
          <path d="M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
      </div>

      <!-- Theme toggle -->
      <button class="theme-btn" id="themeBtn" title="Toggle theme">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ══ TOP STATS BAR ══ -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-pill">
      <span class="stat-pill-label">Agents</span>
      <span class="stat-pill-val c-accent" id="st-agents">—</span>
    </div>
    <div class="stat-pill">
      <span class="stat-pill-label">Total Actions</span>
      <span class="stat-pill-val c-accent2" id="st-actions">—</span>
    </div>
    <div class="stat-pill">
      <span class="stat-pill-label">Faxes Sent</span>
      <span class="stat-pill-val c-accent2" id="st-faxes">—</span>
    </div>
    <div class="stat-pill">
      <span class="stat-pill-label">Follow Ups</span>
      <span class="stat-pill-val c-accent3" id="st-follows">—</span>
    </div>
  </div>

  <!-- ══ MAIN STAGE ══ -->
  <div class="stage" id="stage">
    <div class="state-screen" id="loadingScreen">
      <div class="loader-ring"></div>
      <div class="state-title">Connecting to live data…</div>
      <div class="state-msg">Fetching agent sheets from Google Spreadsheets</div>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════
//  CONFIGURATION
// ══════════════════════════════════════════════
const API_URL = "https://script.google.com/macros/s/AKfycbyozelaC_pQHb_5SZngbMgcBZKY9CjkDsa_Q9wn_XDzPUkLygGbhwYJ82L08mWeMt7c/exec";

// ══════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════
const SYNC_INTERVAL    = 5;   // seconds between data refreshes
const AGENTS_PER_SLIDE = 3;   // max agents per slide
const SLIDE_INTERVAL   = 15;  // seconds between auto-slide advances
const SLIDE_CIRCUMFERENCE = 2 * Math.PI * 14;

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let agentData          = [];
let currentSlide       = 0;
let totalSlides        = 0;
let syncTimer          = null;
let slideTimer         = null;
let syncCountdown      = 0;
let slideCountdown     = 0;
let dashboardBuilt     = false;  // true after the carousel is first created

// ══════════════════════════════════════════════
//  THEME
// ══════════════════════════════════════════════
const themeBtn  = document.getElementById('themeBtn');
const themeIcon = document.getElementById('themeIcon');

const MOON_SVG = `<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
const SUN_SVG  = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;

function setThemeIcon(theme) { themeIcon.innerHTML = theme === 'dark' ? MOON_SVG : SUN_SVG; }

themeBtn.addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  setThemeIcon(next);
});

const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
setThemeIcon(savedTheme);

// ══════════════════════════════════════════════
//  SYNC RING
// ══════════════════════════════════════════════
const syncRingEl = document.getElementById('syncRing');
const syncIconEl = document.getElementById('syncIcon');

function updateSyncRing(secondsLeft) {
  const offset = SLIDE_CIRCUMFERENCE * (1 - secondsLeft / SYNC_INTERVAL);
  syncRingEl.style.strokeDashoffset = offset;
}

// ══════════════════════════════════════════════
//  FETCH DATA
// ══════════════════════════════════════════════
async function fetchData() {
  if (!API_URL || API_URL === 'YOUR_DEPLOYED_WEB_APP_URL_HERE') {
    showConfigBanner();
    showLoadingDone();
    return;
  }

  syncIconEl.classList.add('spinning');
  try {
    const res  = await fetch(API_URL + (API_URL.includes('?') ? '&' : '?') + '_=' + Date.now());
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    agentData = json.agents || [];
    updateLastUpdated(json.fetchedAt);
    updateShiftBadge(json.currentInterval, json.intervals);
    renderDashboard(json.topAgent);
  } catch (e) {
    console.error('Fetch error:', e);
    showError(e.message);
  } finally {
    syncIconEl.classList.remove('spinning');
  }
}

function updateLastUpdated(iso) {
  const el = document.getElementById('lastUpdated');
  if (!iso || !el) return;
  const d = new Date(iso);
  el.textContent = 'Updated ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// ══════════════════════════════════════════════
//  RENDER DASHBOARD
//  Key behaviour: on the first call, build the
//  carousel fresh and start the slide timer.
//  On every subsequent call, rebuild ONLY the
//  card HTML and restore the existing slide
//  position + countdown so the timer is never
//  interrupted by a data refresh.
// ══════════════════════════════════════════════
function renderDashboard(topAgent) {
  const stage = document.getElementById('stage');

  if (!agentData.length) {
    dashboardBuilt = false;
    stage.innerHTML = `
      <div class="state-screen">
        <svg class="state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
        <div class="state-title">No Agents Found</div>
        <div class="state-msg">Add agent names to column A of the "Agents" sheet in your master spreadsheet.</div>
      </div>`;
    return;
  }

  // Snapshot current timer state before touching the DOM
  const savedSlide     = currentSlide;
  const savedCountdown = slideCountdown;

  // Build slide chunks
  const chunks = [];
  for (let i = 0; i < agentData.length; i += AGENTS_PER_SLIDE) {
    chunks.push(agentData.slice(i, i + AGENTS_PER_SLIDE));
  }
  totalSlides = chunks.length;

  // Clamp saved slide in case agent count changed
  const targetSlide = (savedSlide < totalSlides) ? savedSlide : 0;

  // Update top stats bar
  updateTopStats();

  // Build the full scaffold HTML
  const slidesHTML = chunks.map((chunk, idx) => buildSlide(chunk, idx, topAgent)).join('');

  stage.innerHTML = `
    <div id="configBannerHolder"></div>
    <div class="slide-header">
      <span class="slide-title">Agent Dashboard &nbsp;&middot;&nbsp; <span id="slideInfo">Slide 1 of ${totalSlides}</span></span>
      <div style="display:flex;align-items:center;gap:16px;">
        <div class="slide-counter" id="slideDots"></div>
        <div class="nav-btns">
          <button class="nav-btn" onclick="prevSlide()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button class="nav-btn" onclick="nextSlide()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div class="slide-progress"><div class="slide-progress-fill" id="slideProg"></div></div>
    <div class="carousel">
      <div class="slides-wrapper" id="slidesWrapper">${slidesHTML}</div>
    </div>`;

  buildDots();
  // Restore position silently (no animation, no timer reset)
  goToSlide(targetSlide, false);

  if (!dashboardBuilt) {
    // First render — start the slide timer fresh
    dashboardBuilt = true;
    startSlideTimer();
  } else {
    // Subsequent renders — restore the countdown and progress bar
    // The setInterval in slideTimer is still running; just sync visuals
    slideCountdown = savedCountdown;
    const prog = document.getElementById('slideProg');
    if (prog) {
      const pct = ((SLIDE_INTERVAL - savedCountdown) / SLIDE_INTERVAL) * 100;
      prog.style.transition = 'none';
      prog.style.width = pct + '%';
      // Re-enable smooth transition after a short frame gap
      setTimeout(() => { if (prog) prog.style.transition = 'width 1s linear'; }, 60);
    }
  }
}

function buildSlide(agents, idx, topAgent) {
  const cls   = 'agents-' + agents.length;
  const cards = agents.map(a => buildCard(a, topAgent)).join('');
  return `<div class="slide ${cls}" data-idx="${idx}">${cards}</div>`;
}

function buildCard(agent, topAgent) {
  const d       = agent.data;
  const hasData = d && typeof d.totalActions === 'number';
  const initials = agent.agent.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

  const isTop      = topAgent && agent.agent === topAgent && hasData && (d.totalActions || 0) > 0;
  const badgeHTML  = hasData
    ? `<span class="card-badge">Active</span>`
    : `<span class="card-badge no-data">No Data</span>`;
  const crownHTML  = isTop ? `<span class="card-badge top-badge">&#9733; Top</span>` : '';

  const intervalLabel = d && d.intervalLabel ? d.intervalLabel : null;
  const dateHTML = intervalLabel
    ? `<div class="agent-date">Interval: ${intervalLabel}</div>`
    : (d && d.date ? `<div class="agent-date">${d.date}</div>` : '');

  const metricsHTML = hasData ? `
    <div class="metrics-grid">
      <div class="metric m-total span2">
        <svg class="metric-icon" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
        <div class="metric-val">${d.totalActions}</div>
        <div class="metric-label">Total Actions</div>
      </div>
      <div class="metric m-fax">
        <svg class="metric-icon" viewBox="0 0 24 24" fill="none" stroke="var(--accent2)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/>
          <polyline points="16 17 22 17 22 11"/>
        </svg>
        <div class="metric-val">${d.faxesSent ?? 0}</div>
        <div class="metric-label">Faxes Sent</div>
      </div>
      <div class="metric m-follow">
        <svg class="metric-icon" viewBox="0 0 24 24" fill="none" stroke="var(--accent3)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <div class="metric-val">${d.followUps ?? 0}</div>
        <div class="metric-label">Follow Ups</div>
      </div>
    </div>` : `
    <div class="no-data-card">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>No data available for this agent</span>
    </div>`;

  return `
    <div class="agent-card">
      <div class="card-head">
        <div class="agent-info">
          <div class="agent-avatar">${initials}</div>
          <div>
            <div class="agent-name">${escHtml(agent.agent)}</div>
            ${dateHTML}
          </div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">${badgeHTML}${crownHTML}</div>
      </div>
      ${metricsHTML}
    </div>`;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════════
//  TOP STATS
// ══════════════════════════════════════════════
function updateTopStats() {
  let actions = 0, faxes = 0, follows = 0;
  agentData.forEach(a => {
    if (!a.data) return;
    actions += a.data.totalActions || 0;
    faxes   += a.data.faxesSent    || 0;
    follows += a.data.followUps    || 0;
  });
  animateCount('st-agents',  agentData.length);
  animateCount('st-actions', actions);
  animateCount('st-faxes',   faxes);
  animateCount('st-follows', follows);
}

function animateCount(id, target) {
  const el = document.getElementById(id);
  if (!el) return;
  const start = parseInt(el.textContent) || 0;
  const duration = 800;
  const startTime = performance.now();
  function step(now) {
    const t    = Math.min((now - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(start + (target - start) * ease);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ══════════════════════════════════════════════
//  SLIDE CONTROLS
// ══════════════════════════════════════════════
function buildDots() {
  const container = document.getElementById('slideDots');
  if (!container) return;
  container.innerHTML = '';
  for (let i = 0; i < totalSlides; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === currentSlide ? ' active' : '');
    dot.onclick = () => { goToSlide(i); };
    container.appendChild(dot);
  }
}

function goToSlide(idx, animate) {
  if (animate === undefined) animate = true;
  currentSlide = ((idx % totalSlides) + totalSlides) % totalSlides;

  const wrapper = document.getElementById('slidesWrapper');
  if (wrapper) {
    if (!animate) wrapper.style.transition = 'none';
    wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
    if (!animate) setTimeout(() => { if (wrapper) wrapper.style.transition = ''; }, 50);
  }

  document.querySelectorAll('.slide-counter .dot').forEach((d, i) => {
    d.classList.toggle('active', i === currentSlide);
  });

  const info = document.getElementById('slideInfo');
  if (info) info.textContent = `Slide ${currentSlide + 1} of ${totalSlides}`;

  if (animate) resetSlideProgress();
}

function nextSlide() { goToSlide(currentSlide + 1); resetSlideTimer(); }
function prevSlide() { goToSlide(currentSlide - 1); resetSlideTimer(); }

// ══════════════════════════════════════════════
//  SLIDE AUTO-ADVANCE TIMER
// ══════════════════════════════════════════════
function startSlideTimer() {
  clearInterval(slideTimer);
  slideCountdown = SLIDE_INTERVAL;
  resetSlideProgress();
  slideTimer = setInterval(() => {
    slideCountdown--;
    updateSlideProgress();
    if (slideCountdown <= 0) {
      goToSlide(currentSlide + 1);
      slideCountdown = SLIDE_INTERVAL;
    }
  }, 1000);
}

function resetSlideTimer() {
  slideCountdown = SLIDE_INTERVAL;
  clearInterval(slideTimer);
  startSlideTimer();
}

function resetSlideProgress() {
  const el = document.getElementById('slideProg');
  if (!el) return;
  el.style.transition = 'none';
  el.style.width = '0%';
  setTimeout(() => { if (el) el.style.transition = 'width 1s linear'; }, 20);
}

function updateSlideProgress() {
  const el = document.getElementById('slideProg');
  if (!el) return;
  const pct = ((SLIDE_INTERVAL - slideCountdown) / SLIDE_INTERVAL) * 100;
  el.style.width = pct + '%';
}

// ══════════════════════════════════════════════
//  SYNC COUNTDOWN
// ══════════════════════════════════════════════
function startSyncCountdown() {
  clearInterval(syncTimer);
  syncCountdown = SYNC_INTERVAL;
  updateSyncRing(syncCountdown);
  syncTimer = setInterval(() => {
    syncCountdown--;
    updateSyncRing(syncCountdown);
    if (syncCountdown <= 0) {
      syncCountdown = SYNC_INTERVAL;
      fetchData();
    }
  }, 1000);
}

// ══════════════════════════════════════════════
//  CONFIG BANNER (when API_URL not set)
// ══════════════════════════════════════════════
function showConfigBanner() {
  const holder = document.getElementById('configBannerHolder');
  if (holder) {
    holder.innerHTML = `
      <div class="config-banner">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>To activate live data: deploy <code>Code.gs</code> as a Web App, then replace the <code>API_URL</code> value in this file with your deployment URL.</span>
      </div>`;
  }
}

function showLoadingDone() {
  const stage = document.getElementById('stage');
  stage.innerHTML = `<div id="configBannerHolder"></div>`;
  showConfigBanner();
  agentData = [
    { agent: "Demo Agent A", data: { intervalLabel: "09:00 → 11:00", totalActions: 13, faxesSent: 2, followUps: 11 } },
    { agent: "Demo Agent B", data: { intervalLabel: "09:00 → 11:00", totalActions: 20, faxesSent: 5, followUps: 15 } },
    { agent: "Demo Agent C", data: null }
  ];
  renderDashboard("Demo Agent B");
  const banner = document.querySelector('.config-banner');
  if (banner) stage.insertBefore(banner, stage.firstChild);
}

function showError(msg) {
  const stage = document.getElementById('stage');
  stage.innerHTML = `
    <div class="state-screen">
      <svg class="state-icon" viewBox="0 0 24 24" fill="none" stroke="var(--accent5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <div class="state-title">Failed to load data</div>
      <div class="state-msg">${escHtml(msg)}</div>
    </div>`;
}

// ══════════════════════════════════════════════
//  SHIFT BADGE
// ══════════════════════════════════════════════
function updateShiftBadge(interval) {
  const badge = document.getElementById('shiftBadge');
  const label = document.getElementById('shiftLabel');
  if (!badge || !label) return;
  if (!interval) { badge.style.display = 'none'; return; }
  badge.style.display = 'flex';
  label.textContent   = interval.start + ' → ' + (interval.end || '—');
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
(async () => {
  await fetchData();
  startSyncCountdown();
})();
</script>
</body>
</html>
